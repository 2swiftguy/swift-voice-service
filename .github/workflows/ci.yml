name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      TWILIO_SID: test-twilio-sid
      TWILIO_TOKEN: test-twilio-token
      PYTHON_VOICE_TOKEN: test-voice-token
      PYTHON_SMS_TOKEN: test-sms-token

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest -q
